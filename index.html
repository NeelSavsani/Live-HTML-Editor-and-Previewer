<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Code Editor</title>

    <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/monaco-editor@latest/min/vs/loader.js"></script>

    <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon" />
    <script
      src="https://kit.fontawesome.com/e05d24f6c7.js"
      crossorigin="anonymous"
    ></script>
  </head>

  <body>
    <div class="container">
      <div class="left">
        <label><i class="fa-brands fa-html5"></i> HTML</label>
        <div id="html-editor" class="editor-box"></div>

        <label><i class="fa-brands fa-css3-alt"></i> CSS</label>
        <div id="css-editor" class="editor-box"></div>

        <label><i class="fa-brands fa-js"></i> JavaScript</label>
        <div id="js-editor" class="editor-box"></div>
      </div>

      <div class="right">
        <label>Output <i class="fa-solid fa-play"></i></label>
        <iframe id="output"></iframe>
      </div>
    </div>

    <footer class="footer">
      <div class="footer-content">
        <p>© 2026 Live Code Editor</p>

        <p class="made-by">
          Made with <i class="fa-solid fa-heart"></i> by
          <a href="https://neelsavsani.vercel.app" target="_blank"
            >Neel Savsani</a
          >
        </p>

        <div class="socials">
          <a href="https://github.com/NeelSavsani"
            ><i class="fa-brands fa-github"></i
          ></a>
          <a href="https://www.linkedin.com/in/neel-savsani"
            ><i class="fa-brands fa-linkedin"></i
          ></a>
          <a href="mailto:neelsavsani7@gmail.com"
            ><i class="fa-solid fa-envelope"></i
          ></a>
        </div>
      </div>
    </footer>

    <script>
      function run() {
        const htmlCode = htmlEditor.getValue();
        const cssCode = cssEditor.getValue();
        const jsCode = jsEditor.getValue();

        const output = document.getElementById("output");

        output.contentDocument.open();
        output.contentDocument.write(`
    <html>
      <head>
        <style>${cssCode}</style>
      </head>
      <body>
        ${htmlCode}
        <script>
          try {
            ${jsCode}
          } catch(e) {
            console.error(e);
          }
        <\/script>
      </body>
    </html>
  `);
        output.contentDocument.close();
      }

      require.config({
        paths: { vs: "https://unpkg.com/monaco-editor@latest/min/vs" },
      });

      require(["vs/editor/editor.main"], function () {
        // ✅ HTML CONFIG (clean)
        monaco.languages.html.htmlDefaults.setOptions({
          format: {
            tabSize: 2,
            insertSpaces: true,
          },
          suggest: {
            html5: true,
          },
        });

        // 🔥 HTML EDITOR
        window.htmlEditor = monaco.editor.create(
          document.getElementById("html-editor"),
          {
            value: "<h1>Hello Editor 🚀</h1>",
            language: "html",
            theme: "vs-dark",
            automaticLayout: true,

            // 🔥 UX IMPROVEMENTS
            quickSuggestions: true,
            suggestOnTriggerCharacters: true,
            tabCompletion: "on",
          },
        );

        // CSS EDITOR
        window.cssEditor = monaco.editor.create(
          document.getElementById("css-editor"),
          {
            value: "body { background: black; color: white; }",
            language: "css",
            theme: "vs-dark",
            automaticLayout: true,
          },
        );

        // JS EDITOR
        window.jsEditor = monaco.editor.create(
          document.getElementById("js-editor"),
          {
            value: 'console.log("Hello World");',
            language: "javascript",
            theme: "vs-dark",
            automaticLayout: true,
          },
        );

        // 🔥 SNIPPETS (VS Code-like)
        monaco.languages.registerCompletionItemProvider("html", {
          provideCompletionItems: () => ({
            suggestions: [
              snippet("div", "<div>$1</div>"),
              snippet("span", "<span>$1</span>"),
              snippet("p", "<p>$1</p>"),
              snippet("h1", "<h1>$1</h1>"),
              snippet("h2", "<h2>$1</h2>"),
              snippet("button", "<button>$1</button>"),

              snippet("a", '<a href="$1">$2</a>'),
              snippet("img", '<img src="$1" alt="$2">'),

              snippet("ul", "<ul>\n\t<li>$1</li>\n</ul>"),
              snippet("li", "<li>$1</li>"),

              snippet("form", "<form>$1</form>"),
              snippet("input", '<input type="$1" placeholder="$2">'),

              snippet("section", "<section>$1</section>"),
              snippet("header", "<header>$1</header>"),
              snippet("footer", "<footer>$1</footer>"),
            ],
          }),
        });

        // helper function
        function snippet(label, body) {
          return {
            label: label,
            kind: monaco.languages.CompletionItemKind.Snippet,
            insertText: body,
            insertTextRules:
              monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
            documentation: label + " snippet",
          };
        }

        // 🔥 LIVE AUTO RUN
        htmlEditor.onDidChangeModelContent(run);
        cssEditor.onDidChangeModelContent(run);
        jsEditor.onDidChangeModelContent(run);

        // 🔥 INITIAL RUN
        run();
      });
    </script>
  </body>
</html>
